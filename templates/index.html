<!DOCTYPE html>
<html>
<head>
    <title>TvTIME!</title>
    <!--<link href="/static/style.css" rel="stylesheet">-->
    <style>
        body {
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 50px;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #666;
            margin-bottom: 30px;
        }

        button {
            color: white;
            background-color: #4caf50;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;

        }
    </style>
</head>
<body>
<h1>Викторина для школьников Взмаха</h1>

<h2>{{ question.title }}</h2>
<h3>{{ question.text }}</h3>

<button>{{ question.answers.0 }}</button>
<button>{{ question.answers.1 }}</button>
<button>{{ question.answers.2 }}</button>
<button>{{ question.answers.3 }}</button>
</body>
</html>
