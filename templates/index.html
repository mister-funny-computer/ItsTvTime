{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>TvTIME!</title>
    <link href="{% static 'core/css/style.css' %}" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <h1>Викторина для школьников Взмаха</h1>

    <h2>{{ question.text }}</h2>

    <img src="/static/{{ question.image_url }}" class="question-image">

    <form method="POST">
        {% csrf_token %}
        <button {% if result %}disabled{% endif %} type="submit" name="answer"
                value="{{ question.answers.0 }}">{{ question.answers.0 }}</button>
        <button {% if result %}disabled{% endif %} type="submit" name="answer"
                value="{{ question.answers.1 }}">{{ question.answers.1 }}</button>
        <button {% if result %}disabled{% endif %} type="submit" name="answer"
                value="{{ question.answers.2 }}">{{ question.answers.2 }}</button>
        <button {% if result %}disabled{% endif %} type="submit" name="answer"
                value="{{ question.answers.3 }}">{{ question.answers.3 }}</button>
    </form>

    {% if result %}
        <p class="result">{{ result }}</p>

        {% if question.id == last_question_id %}
            <a href="/result">
                Перейти к результату
            </a>
        {% else %}
            <a href="/{{ next_question_index }}">
                Следующий вопрос
            </a>
        {% endif %}
    {% endif %}
</div>

<div class="score-board">
    Счёт: {{ score }}
</div>

</body>
</html>
