<!DOCTYPE html>
<html>
<head>
    <title>TvTIME!</title>
    <!--<link href="/static/style.css" rel="stylesheet">-->
    <style>
        body {
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 50px;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #666;
            margin-bottom: 30px;
        }

        button {
            color: white;
            background-color: #4caf50;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            opacity: 0.7;
        }


        .result {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 30px;
        }

        .score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ffd700;
            padding: 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #333;

        }
    </style>
</head>
<body>
<h1>Викторина для школьников Взмаха</h1>

<h2>{{ question.title }}</h2>
<h3>{{ question.text }}</h3>

<form method="POST">
    {% csrf_token %}
    <button {% if result %}disabled{% endif %} type="submit" name="answer" value="{{ question.answers.0 }}">{{ question.answers.0 }}</button>
    <button {% if result %}disabled{% endif %} type="submit" name="answer" value="{{ question.answers.1 }}">{{ question.answers.1 }}</button>
    <button {% if result %}disabled{% endif %} type="submit" name="answer" value="{{ question.answers.2 }}">{{ question.answers.2 }}</button>
    <button {% if result %}disabled{% endif %} type="submit" name="answer" value="{{ question.answers.3 }}">{{ question.answers.3 }}</button>
</form>

{% if result %}
    <p class="result">{{ result }}</p>

    {% if question.id == "2" %}
        <a href="/result">
           Перейти к результату
        </a>
    {% else %}
        <a href="/{{ next_question_index }}">
            Следующий вопрос
        </a>
    {% endif %}
{% endif %}

<div class="score-board">
    Счёт: {{ score }}
</div>

</body>
</html>
